<div id="pane-eod" class="glass-pane">
  <h4 class="mb-4"><i class="bi bi-send-check me-2"></i>EOD Report</h4>
  
  <span class="micro-label">Partner Name (Optional)</span>
  <select id="eodPartner" class="form-select mb-3"><option value="">-- None --</option></select>
  
  <div class="row g-2 mb-3">
    <div class="col-6"><span class="micro-label">My Hours</span><input type="number" id="eodMyHours" class="form-control" placeholder="e.g. 8"></div>
    <div class="col-6"><span class="micro-label">Partner Hours</span><input type="number" id="eodPartnerHours" class="form-control" placeholder="e.g. 8"></div>
  </div>
  
  <span class="micro-label">Total Mileage</span>
  <input type="number" id="eodMileage" class="form-control mb-4" placeholder="e.g. 45">

  <span class="micro-label">Send Report To</span>
  <input type="email" id="eodEmail" class="form-control mb-4" placeholder="manager@centricfiber.com">
  
  <button onclick="sendEOD()" id="btnEod" class="btn btn-dark w-100 rounded-pill py-2 fw-bold">Send EOD Report</button>
  <div id="eodSuccess" class="alert alert-success mt-3 small fw-bold text-center" style="display:none;">Report Sent!</div>
</div>
