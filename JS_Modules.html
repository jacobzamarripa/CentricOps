<script>
  var isDarkMode = localStorage.getItem('centric_dark_mode') === 'true';
  if (isDarkMode) document.body.classList.add('dark-mode');

  var APP_DATA = {};
  var loadingInterval;
  var pendingCommSave = null;
  
  function toProperCase(str) {
    if (!str) return '';
    return str.toString().toLowerCase().replace(/\b\w/g, function(char) { return char.toUpperCase(); });
  }

  function initSelect(id) {
    var el = typeof id === 'string' ? document.getElementById(id) : id;
    if (!el) return;
    if (el.tomselect) el.tomselect.destroy();
    new TomSelect(el, { create: false, controlInput: '<input>', searchField: ['text'] });
  }

  function toggleDarkMode() {
    var body = document.body;
    body.classList.toggle('dark-mode');
    var isDark = body.classList.contains('dark-mode');
    localStorage.setItem('centric_dark_mode', isDark);
    updateDarkModeIcon(isDark);
  }
  
  function updateDarkModeIcon(isDark) {
    var icon = document.querySelector('#btnDarkMode i');
    if (!icon) return;
    if (isDark) { icon.classList.remove('bi-moon-stars', 'text-primary'); icon.classList.add('bi-sun', 'text-warning'); } 
    else { icon.classList.remove('bi-sun', 'text-warning'); icon.classList.add('bi-moon-stars', 'text-primary'); }
  }

  var MARKET_COLORS = { "Austin": "#f59e0b", "Dallas/Fortworth": "#22c55e", "Florida": "#06b6d4", "Houston": "#f97316", "San Antonio E/NE": "#3b82f6", "San Antonio S/SW": "#4f46e5" };
  function getMktColor(mktName) { return MARKET_COLORS[mktName] || "#64748b"; }

  // --- CALENDAR LOGIC ---
  var currCalDate = new Date();
  function initCalendar() { var d = new Date(); document.getElementById('headerDateDisplay').innerText = d.toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'}); document.getElementById('historyDateDisplay').innerText = "- " + d.toLocaleDateString('en-US', {month:'short', day:'numeric'}); renderCalendar(currCalDate); }
  function toggleCalendar() { var cal = document.getElementById('calendarWidget'); cal.style.display = (cal.style.display === 'none' || cal.style.display === '') ? 'block' : 'none'; }
  function changeMonth(dir) { currCalDate.setMonth(currCalDate.getMonth() + dir); renderCalendar(currCalDate); }
  
  // Close calendar when clicking outside
  document.addEventListener('click', function(e) {
    var cal = document.getElementById('calendarWidget');
    var btn = document.querySelector('button[onclick="toggleCalendar()"]');
    if (cal && cal.style.display === 'block' && !cal.contains(e.target) && (!btn || !btn.contains(e.target))) { cal.style.display = 'none'; }
  });

  function renderCalendar(date) {
    document.getElementById('calMonthYear').innerText = date.toLocaleDateString('en-US', {month:'long', year:'numeric'});
    var firstDay = new Date(date.getFullYear(), date.getMonth(), 1).getDay(); var daysInMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate(); var today = new Date(); var html = '';
    for(var i=0; i<firstDay; i++) html += '<div></div>';
    for(var i=1; i<=daysInMonth; i++) { var isToday = (i === today.getDate() && date.getMonth() === today.getMonth() && date.getFullYear() === today.getFullYear()); var cls = isToday ? 'cal-day cal-today' : 'cal-day'; html += '<div class="' + cls + '">' + i + '</div>'; }
    document.getElementById('calDays').innerHTML = html;
  }

  // --- SWIPE GESTURES ---
  var touchstartX = 0; var touchendX = 0;
  var touchstartY = 0; var touchendY = 0;
  var panesOrder = ['pane-apps', 'pane-tracker', 'pane-tool', 'pane-history', 'pane-map', 'pane-comm'];
  var preventSwipe = false;
  document.addEventListener('touchstart', function(e) { 
    preventSwipe = !!e.target.closest('#adminMap') || !!e.target.closest('.leaflet-container');
    if (preventSwipe) return;
    touchstartX = e.changedTouches[0].screenX; touchstartY = e.changedTouches[0].screenY; 
  }, {passive: true});
  document.addEventListener('touchend', function(e) { 
    if (preventSwipe) return;
    touchendX = e.changedTouches[0].screenX; touchendY = e.changedTouches[0].screenY; handleSwipe(); 
  }, {passive: true});
  function handleSwipe() {
    if (window.innerWidth > 1024) return; 
    var diffX = touchstartX - touchendX; var diffY = Math.abs(touchstartY - touchendY);
    if (Math.abs(diffX) < 120 || diffY > Math.abs(diffX)) return; 
    var availablePanes = panesOrder;
    var currentIndex = -1;
    for(var i=0; i<availablePanes.length; i++) { if(document.getElementById(availablePanes[i]).classList.contains('active-pane')) { currentIndex = i; break; } }
    if (currentIndex === -1) return;
    var availableDockItems = Array.from(document.querySelectorAll('.dock-item')).filter(function(d) { return d.style.display !== 'none'; });
    if (diffX > 0 && currentIndex < availablePanes.length - 1) { switchPane(availablePanes[currentIndex + 1], availableDockItems[currentIndex + 1]); } 
    else if (diffX < 0 && currentIndex > 0) { switchPane(availablePanes[currentIndex - 1], availableDockItems[currentIndex - 1]); }
  }

  window.onload = refreshApp;

  function refreshApp() {
    var loader = document.getElementById('loader');
    loader.style.display = 'flex';
    setTimeout(function() { loader.style.opacity = '1'; }, 10);
    document.getElementById('loaderProgress').style.width = '0%';

    updateDarkModeIcon(isDarkMode);
    initCalendar();
    var texts = ["Connecting to Master DB...", "Verifying Credentials...", "Parsing Operations Roster...", "Mounting Executive Glass UI..."];
    var progress = 0; var textIdx = 0;
    if (loadingInterval) clearInterval(loadingInterval);
    loadingInterval = setInterval(function() {
      progress += Math.random() * 15; if(progress > 85) progress = 85; 
      document.getElementById('loaderProgress').style.width = progress + '%';
      if (Math.random() > 0.5) { document.getElementById('loaderText').innerText = texts[textIdx % texts.length]; textIdx++; }
    }, 400);

    google.script.run
      .withSuccessHandler(function(data) {
        clearInterval(loadingInterval);
        document.getElementById('loaderProgress').style.width = '100%'; document.getElementById('loaderText').innerText = "System Ready.";
        setTimeout(function() { document.getElementById('loader').style.opacity = '0'; setTimeout(function() { document.getElementById('loader').style.display = 'none'; checkIdentity(); }, 500); }, 400);

        APP_DATA = data;
        APP_DATA.fullHistoryLoaded = false;
        historyLoaded = true; // 48 hours preloaded automatically
        document.getElementById('historySearchContainer').style.display = 'block';
        
        renderTechTabs();
        renderAppointments(); 
        renderHistory(); 
        renderCommunities(data.communities);
        setTimeout(renderAdminMap, 100);
        fillDropdown('mkt', data.markets, "Market"); fillDropdown('typ', data.types, "Type");
        
        var tFilter = document.getElementById('commTypeFilter');
        tFilter.innerHTML = '<option value="All">All Types</option>';
        data.types.forEach(function(t) { tFilter.innerHTML += '<option value="' + t + '">' + t + '</option>'; });

        var mFilter = document.getElementById('commMktFilter');
        mFilter.innerHTML = '<option value="All">All Markets</option>';
        data.markets.forEach(function(m) { mFilter.innerHTML += '<option value="' + m + '">' + m + '</option>'; });

        // Populate Form Data
        var jtSelect = document.getElementById('trackJobType');
        jtSelect.innerHTML = '';
        data.jobTypes.forEach(function(jt) { jtSelect.innerHTML += '<option value="' + jt + '">' + jt + '</option>'; });
        
        handleJobTypeChange(); // Initialize the dynamic fields based on first loaded Job Type
        
        var colors = ["Blue", "Orange", "Green", "Brown", "Slate", "White", "Red", "Black", "Yellow", "Violet", "Rose", "Aqua"];
        var tubeSel = document.getElementById('trackTubeColor');
        var portSel = document.getElementById('trackPortColor');
        
        if(tubeSel) {
          tubeSel.innerHTML = '<option value="">-- Color --</option>';
          colors.forEach(function(c) { tubeSel.innerHTML += '<option value="' + c + '">' + c + '</option>'; });
        }
        
        if(portSel) {
          portSel.innerHTML = '<option value="">-- Port/Color --</option><optgroup label="Colors">';
          colors.forEach(function(c) { portSel.innerHTML += '<option value="' + c + '">' + c + '</option>'; });
          portSel.innerHTML += '</optgroup><optgroup label="Ports (1-96)">';
          for(var i=1; i<=96; i++) { portSel.innerHTML += '<option value="' + i + '">' + i + '</option>'; }
          portSel.innerHTML += '</optgroup>';
        }

        var pSelect = document.getElementById('eodPartner');
        pSelect.innerHTML = '<option value="">-- None --</option>';
        data.roster.forEach(function(emp) { pSelect.innerHTML += '<option value="' + emp.name + '">' + toProperCase(emp.name) + '</option>'; });

        // Initialize Tom Select on all dropdowns
        setTimeout(function() {
          initSelect('commTypeFilter');
          initSelect('commMktFilter');
          initSelect('trackJobType');
          initSelect('trackTubeColor');
          initSelect('trackPortColor');
          initSelect('eodPartner');
          initSelect('histFilter');
          initSelect('histGroupBy');
        }, 100);

      })
      .withFailureHandler(function(err) { document.getElementById('loaderText').innerHTML = '<span class="text-danger fw-bold">' + err.message + '</span>'; clearInterval(loadingInterval); }).getAppData();
  }

  function checkIdentity(force = false) {
    var techId = localStorage.getItem('centric_tech_id');
    if (!techId || force) {
      var html = '<h5 class="fw-bold mb-3 text-primary">' + (force ? 'Change Identity' : 'Welcome to Field Ops') + '</h5><p class="small text-muted mb-4">Please verify your identity against the Master Roster.</p><select id="inputTechId" class="form-select mb-4"><option value="">-- Employee Roster --</option>';
      APP_DATA.roster.forEach(function(emp) { html += '<option value="' + (emp.short ? emp.short : emp.name) + '" ' + (techId === (emp.short ? emp.short : emp.name) ? 'selected' : '') + '>' + toProperCase(emp.name) + ' (' + emp.role + ')</option>'; });
      html += '</select>';
      if (force) { html += '<div class="d-flex gap-2"><button class="btn btn-outline-secondary w-50 rounded-pill fw-bold" onclick="closeModal()">Cancel</button><button class="btn btn-primary w-50 rounded-pill fw-bold" onclick="processIdentitySelection(' + force + ')">Next</button></div>'; }
      else { html += '<button class="btn btn-primary w-100 rounded-pill fw-bold" onclick="processIdentitySelection(' + force + ')">Next</button>'; }
      document.getElementById('modalContent').innerHTML = html; document.getElementById('modalOverlay').classList.add('show');
      setTimeout(function() { initSelect('inputTechId'); }, 100);
    } else { 
      document.getElementById('displayTechId').innerHTML = toProperCase(techId) + ' <i class="bi bi-pencil-fill ms-1 opacity-50"></i>'; 
      toggleAdminFeatures();
    }
  }
  
  var selectedIdentityVal = '';

  function processIdentitySelection(force) {
    var val = document.getElementById('inputTechId').value; 
    if(!val) return alert("Please select your name."); 
    selectedIdentityVal = val;
    
    var emp = APP_DATA.roster.find(function(e) { return (e.short ? e.short : e.name) === val || e.name === val; });
    var existingPin = emp ? emp.password : '';

    if (existingPin) {
      var html = '<h5 class="fw-bold mb-3 text-primary"><i class="bi bi-lock-fill me-2"></i>Enter PIN</h5><p class="small text-muted mb-4">Please enter your 4-digit PIN to verify your identity.</p><input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" id="verifyPinInput" class="form-control text-center mx-auto mb-4" style="max-width:200px; letter-spacing: 4px; font-size: 1.5rem;" placeholder="----"><div class="d-flex gap-2"><button class="btn btn-outline-secondary w-50 rounded-pill fw-bold" onclick="checkIdentity(' + force + ')">Back</button><button class="btn btn-primary w-50 rounded-pill fw-bold" onclick="verifyIdentityPin(\'' + existingPin + '\')">Verify</button></div>';
      document.getElementById('modalContent').innerHTML = html;
    } else {
      var html = '<h5 class="fw-bold mb-3 text-primary"><i class="bi bi-key-fill me-2"></i>Create PIN</h5><div class="alert alert-warning small py-2 px-3 mb-3 text-start" style="line-height: 1.3;"><b>Disclaimer:</b> Please do NOT use a sensitive PIN or one you use elsewhere (like a bank). This is a simple, unsecure 4-digit PIN that administrators will be able to see.</div><p class="small text-muted mb-3">Create a 4-digit PIN to protect your identity.</p><input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" id="createPinInput" class="form-control text-center mx-auto mb-4" style="max-width:200px; letter-spacing: 4px; font-size: 1.5rem;" placeholder="----"><div class="d-flex gap-2"><button class="btn btn-outline-secondary w-50 rounded-pill fw-bold" onclick="checkIdentity(' + force + ')">Back</button><button class="btn btn-primary w-50 rounded-pill fw-bold" id="btnCreatePin" onclick="createIdentityPin()">Save PIN</button></div>';
      document.getElementById('modalContent').innerHTML = html;
    }
  }

  function verifyIdentityPin(expectedPin) {
    var enteredPin = document.getElementById('verifyPinInput').value;
    if (enteredPin === expectedPin) { finalizeIdentitySave(); } 
    else { alert("Incorrect PIN."); }
  }

  function createIdentityPin() {
    var newPin = document.getElementById('createPinInput').value;
    if (!newPin || newPin.length !== 4 || !/^\d{4}$/.test(newPin)) { return alert("Please enter a valid 4-digit PIN."); }
    
    var btn = document.getElementById('btnCreatePin');
    btn.innerText = "Saving...";
    
    google.script.run.withSuccessHandler(function() {
      var emp = APP_DATA.roster.find(function(e) { return (e.short ? e.short : e.name) === selectedIdentityVal || e.name === selectedIdentityVal; });
      if (emp) emp.password = newPin;
      finalizeIdentitySave();
    }).withFailureHandler(function(err) {
      alert("Failed to save PIN: " + err.message);
      btn.innerText = "Save PIN";
    }).updateUserPin(selectedIdentityVal, newPin);
  }

  function finalizeIdentitySave() { 
    var val = selectedIdentityVal;
    var oldId = localStorage.getItem('centric_tech_id'); 
    if (oldId && oldId !== val) { google.script.run.logIdentityChange(oldId, val); } 
    localStorage.setItem('centric_tech_id', val); 
    document.getElementById('displayTechId').innerHTML = toProperCase(val) + ' <i class="bi bi-pencil-fill ms-1 opacity-50"></i>'; 
    closeModal(); 
    renderTechTabs();
    renderAppointments();
    renderHistory(); 
    toggleAdminFeatures();
  }

  function toggleAdminFeatures() { // This function is called on identity change
    var isMgr = isManager();
    var paneAdmin = document.getElementById('pane-admin');
    var fab = document.getElementById('fabFeedback');
    var fabIcon = fab ? fab.querySelector('i') : null;

    function restoreFabDefault() {
      if (fab && fabIcon) {
        fab.onclick = openFeedbackModal;
        fab.title = "Submit Beta Feedback";
        if (fab.classList.contains('btn-primary')) fab.classList.replace('btn-primary', 'btn-warning');
        fabIcon.className = 'bi bi-chat-square-text-fill fs-4';
      }
    }

    if (isMgr) {
      if (paneAdmin) { 
        paneAdmin.style.display = ''; 
        adminUnlocked = false;
        var lockScreen = document.getElementById('adminLockScreen');
        var contentScreen = document.getElementById('adminContent');
        if(lockScreen) lockScreen.style.display = 'block';
        if(contentScreen) contentScreen.style.display = 'none';
        renderFeedback(); 
      }
      
      if (window.innerWidth <= 1024) { // Mobile Admin FAB
        if (fab && fabIcon) {
          fab.onclick = function() { switchPane('pane-admin', null); };
          fab.title = "Open Admin Panel";
          if (fab.classList.contains('btn-warning')) fab.classList.replace('btn-warning', 'btn-primary');
          fabIcon.className = 'bi bi-shield-lock fs-4';
        }
      } else { // Desktop Admin FAB
        restoreFabDefault();
      }
    } else {
      if (paneAdmin) paneAdmin.style.display = 'none';
      restoreFabDefault(); // Non-Admin FAB
    }
  }

  var adminUnlocked = false;
  function unlockAdmin() {
    var pwd = document.getElementById('adminPwdInput').value;
    var techId = getTechId();
    var emp = APP_DATA.roster ? APP_DATA.roster.find(function(e) { return (e.short ? e.short : e.name) === techId || e.name === techId; }) : null;
    var expectedPwd = (emp && emp.password) ? emp.password : '1234'; // Default fallback

    if (pwd === expectedPwd) {
      adminUnlocked = true;
      document.getElementById('adminLockScreen').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
      document.getElementById('adminPwdInput').value = '';
      showNewFeedbackLog(); // Show new feedback popups ONLY after unlocking
    } else {
      alert('Incorrect password.');
    }
  }

  function showNewFeedbackLog() {
    if (!isManager() || !APP_DATA.feedback || APP_DATA.feedback.length === 0) return;
    const lastSeenTimestamp = parseInt(localStorage.getItem('centric_last_seen_feedback') || '0');
    const newFeedback = APP_DATA.feedback.filter(function(fb) { return fb.timestamp > lastSeenTimestamp; });

    if (newFeedback.length > 0) {
      let html = '<h5 class="fw-bold mb-1"><i class="bi bi-bell-fill text-primary me-2"></i>New Feedback Received</h5><p class="small text-muted mb-4">Here\'s what\'s new since you last checked in.</p><div class="overflow-auto mb-4" style="max-height: 40vh;">';
      newFeedback.forEach(function(fb) { html += '<div class="poly-card p-3 mb-2"><div class="d-flex justify-content-between mb-1"><span class="fw-bold text-primary" style="font-size:12px;">' + toProperCase(fb.user) + '</span><span class="micro-label">' + fb.time + '</span></div><div class="small">' + fb.text + '</div></div>'; });
      html += '</div><button class="btn btn-primary w-100 rounded-pill fw-bold" onclick="dismissNewFeedbackLog()">Got it, thanks!</button>';
      document.getElementById('modalContent').innerHTML = html; document.getElementById('modalOverlay').classList.add('show');
    }
  }

  function dismissNewFeedbackLog() {
    if (APP_DATA.feedback && APP_DATA.feedback.length > 0) { const latestTimestamp = APP_DATA.feedback[0].timestamp; if (latestTimestamp) localStorage.setItem('centric_last_seen_feedback', latestTimestamp); }
    closeModal();
  }

  function renderFeedback() {
    var container = document.getElementById('adminFeedbackList');
    if (!container) return;
    var fbs = APP_DATA.feedback || [];
    if (fbs.length === 0) { container.innerHTML = '<div class="micro-label text-center mt-4">No feedback found.</div>'; return; }
    var html = '';
    fbs.forEach(function(fb) { html += '<div class="poly-card p-3 mb-2"><div class="d-flex justify-content-between mb-1"><span class="fw-bold text-primary" style="font-size:12px;">' + toProperCase(fb.user) + '</span><span class="micro-label">' + fb.time + '</span></div><div class="small">' + fb.text + '</div></div>'; });
    container.innerHTML = html;
  }
  
  function getTechId() { return localStorage.getItem('centric_tech_id') || 'Unknown'; }
  
  function isManager() {
    var id = getTechId();
    var emp = APP_DATA.roster ? APP_DATA.roster.find(function(e) { return (e.short ? e.short : e.name) === id || e.name === id; }) : null;
    if (emp && emp.role) {
      var r = emp.role.toLowerCase();
      return r.includes('admin') || r.includes('manager');
    }
    return false;
  }

  function getTechEmail() { 
    var id = getTechId(); 
    var emp = APP_DATA.roster ? APP_DATA.roster.find(function(e) { return (e.short ? e.short : e.name) === id; }) : null; 
    return emp && emp.email ? emp.email : ''; 
  }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

  // --- WORKFLOW BRIDGES ---
  function jumpToProvisioning() { switchPane('pane-tool', document.querySelector('.dock-item[onclick*="pane-tool"]')); }
  function jumpToTracker() { switchPane('pane-tracker', document.querySelector('.dock-item[onclick*="pane-tracker"]')); }

  function switchPane(id, el) {
    if (window.innerWidth <= 1024) {
      document.querySelectorAll('.glass-pane').forEach(function(p) { p.classList.remove('active-pane'); });
      document.querySelectorAll('.dock-item').forEach(function(d) { d.classList.remove('active'); });
      document.getElementById(id).classList.add('active-pane'); 
      if(el) el.classList.add('active');
      window.scrollTo(0,0);
      if(el) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    } else {
      var target = document.getElementById(id);
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      var origBorder = target.style.border;
      target.style.border = "2px solid var(--accent-active)";
      setTimeout(function() { target.style.border = origBorder; }, 2000);
    }
  }

  // --- MANAGER TABS LOGIC ---
  window.selectedTechFilter = 'All';
  function renderTechTabs() {
    var container = document.getElementById('techTabsContainer');
    if (!isManager()) { container.style.display = 'none'; return; }
    container.style.display = 'flex';

    var techMap = {};
    APP_DATA.roster.forEach(function(e) { 
      var id = e.short || e.name; 
      techMap[id] = e.name; 
    });
    var techs = Object.keys(techMap).sort();

    var fiberColors = [
      { bg: '#3b82f6', fg: '#fff' }, { bg: '#f97316', fg: '#fff' }, { bg: '#22c55e', fg: '#fff' },
      { bg: '#8b4513', fg: '#fff' }, { bg: '#64748b', fg: '#fff' }, { bg: '#ffffff', fg: '#000' },
      { bg: '#ef4444', fg: '#fff' }, { bg: '#000000', fg: '#fff' }, { bg: '#eab308', fg: '#000' },
      { bg: '#8b5cf6', fg: '#fff' }, { bg: '#f43f5e', fg: '#fff' }, { bg: '#06b6d4', fg: '#000' }
    ];

    var html = '<div class="tech-tab ' + (window.selectedTechFilter === 'All' ? 'active' : '') + '" data-tech="All" onclick="selectTechFilter(\'All\')" style="background:#000000; color:#ffffff; border-color:#000000;">All</div>';
    
    techs.forEach(function(t, i) {
      var color = fiberColors[i % fiberColors.length];
      var border = color.bg === '#ffffff' ? 'var(--border-glass)' : color.bg;
      var isActive = window.selectedTechFilter === t ? 'active' : '';
      var fullName = toProperCase(techMap[t] || t);
      var displayTechShort = fullName.split(' ')[0]; // Compact first name only
      html += '<div class="tech-tab ' + isActive + '" data-tech="' + t + '" onclick="selectTechFilter(\'' + t + '\')" style="background:' + color.bg + '; color:' + color.fg + '; border-color:' + border + ';" title="' + fullName + '"><span class="tech-name-short">' + displayTechShort + '</span><span class="tech-name-full">' + fullName + '</span></div>';
    });
    container.innerHTML = html;
  }

  function selectTechFilter(tech) {
    window.selectedTechFilter = tech;
    var tabs = document.querySelectorAll('.tech-tab');
    tabs.forEach(function(t) {
      if (t.getAttribute('data-tech') === tech) t.classList.add('active');
      else t.classList.remove('active');
    });
    
    renderAppointments();
    renderHistory();
    renderAdminMap();
  }

  function parseApptTime(a) {
    if (a.rawDate && a.rawTime) return { date: new Date(a.rawDate + 'T' + a.rawTime + ':00'), mins: a.durMins || 60 };
    var now = new Date();
    var m = a.time ? a.time.match(/(\d+)\/(\d+)\s*•\s*(\d+):(\d+)\s*(AM|PM)/i) : null;
    if (m) {
      var mo = parseInt(m[1]) - 1, d = parseInt(m[2]), h = parseInt(m[3]), min = parseInt(m[4]), ampm = m[5].toUpperCase();
      if (ampm === 'PM' && h < 12) h += 12;
      if (ampm === 'AM' && h === 12) h = 0;
      return { date: new Date(now.getFullYear(), mo, d, h, min), mins: 60 };
    }
    return { date: now, mins: 60 };
  }

  function renderAppointments() {
    var list = document.getElementById('apptList');
    var appts = APP_DATA.appointments || [];
    
    if (!isManager()) { appts = appts.filter(function(a) { return a.user === getTechId(); }); } 
    else if (window.selectedTechFilter !== 'All') { appts = appts.filter(function(a) { return a.user === window.selectedTechFilter; }); }

    if (!appts.length) { list.innerHTML = '<div class="micro-label text-center mt-4">No appointments found.</div>'; return; }
    
    appts.sort(function(a, b) { return parseApptTime(a).date.getTime() - parseApptTime(b).date.getTime(); });

    var html = '<div class="timeline-wrapper" id="timelineWrapper"><div class="timeline-container">';
    for (var i = 5; i <= 22; i++) { var displayHour = i === 0 ? '12 AM' : (i < 12 ? i + ' AM' : (i === 12 ? '12 PM' : (i - 12) + ' PM')); html += '<div class="timeline-hour"><div class="timeline-hour-text">' + displayHour + '</div><div class="timeline-line"></div></div>'; }

    appts.forEach(function(a) {
      var parsed = parseApptTime(a); var dt = parsed.date; var dur = parsed.mins;
      var top = ((dt.getHours() - 5) * 60) + dt.getMinutes(); var height = dur; // 1 min = 1px exact mapping
      var escAddr = (a.address || "").replace(/'/g, "\\'");
      var escComm = (a.comm || "").replace(/'/g, "\\'");
      var escUnit = (a.unit || "").replace(/'/g, "\\'");
      var escJobType = (a.jobType || "").replace(/'/g, "\\'");
      
      var isLogged = a.status === 'Logged';
      var now = new Date();
      var endTime = new Date(dt.getTime() + dur * 60000);
      var isPassed = !isLogged && now > endTime;
      
      var bgCol = 'rgba(59, 130, 246, 0.08)';
      var bdrCol = 'var(--accent-active)';
      var timeCol = 'var(--accent-active)';
      
      if (isLogged) { bgCol = 'rgba(34, 197, 94, 0.08)'; bdrCol = '#22c55e'; timeCol = '#22c55e'; }
      else if (isPassed) { bgCol = 'rgba(239, 68, 68, 0.08)'; bdrCol = '#ef4444'; timeCol = '#ef4444'; }
      
      html += '<div class="timeline-event" style="top:' + top + 'px; height:' + height + 'px; background:' + bgCol + '; border-left: 4px solid ' + bdrCol + ';" onclick="loadActiveJob(\'' + escAddr + '\', \'' + escComm + '\', \'' + escUnit + '\', \'' + escJobType + '\', \'' + a.id + '\')">';
      html += '<div style="position:absolute; right:4px; top:4px; display:flex; gap:8px;" onclick="event.stopPropagation()">';
      html += '<div style="cursor:pointer;" class="text-primary opacity-50" onclick="openApptModal(\'' + a.id + '\')"><i class="bi bi-pencil-fill"></i></div>';
      html += '<div style="cursor:pointer;" class="text-danger opacity-50" onclick="deleteAppt(\'' + a.id + '\')"><i class="bi bi-trash-fill"></i></div>';
      html += '</div>';
      
      var techBadge = '';
      if (isManager() && window.selectedTechFilter === 'All' && a.user) { techBadge = '<span class="badge bg-secondary ms-2" style="font-size:8px;">' + toProperCase(a.user) + '</span>'; }
      html += '<div class="timeline-event-title pe-4 d-flex align-items-center">' + a.name + techBadge + '</div>';
      
      if (height >= 30) { html += '<div class="timeline-event-time" style="color:' + timeCol + ';">' + a.time + '</div>'; }
      if (height >= 50) { html += '<div class="timeline-event-addr">' + a.address + '</div>'; }
      html += '</div>';
    });
    html += '</div></div>';
    list.innerHTML = html;

    setTimeout(function() {
      var firstEvent = document.querySelector('.timeline-event');
      if (firstEvent) { var wrapper = document.getElementById('timelineWrapper'); wrapper.scrollTop = Math.max(0, parseInt(firstEvent.style.top) - 60); }
    }, 100);
  }

  function renderHistory() {
    if (!historyLoaded) return;
    var mContainer = document.getElementById('historyItemsMobile'); 
    var dContainer = document.querySelector('#historyTableDesktop tbody');
    var histArray = APP_DATA.history || [];
    
    var isMgr = isManager();
    var filterEl = document.getElementById('histFilter');
    var toggleEl = document.getElementById('historyViewToggles');
    var groupEl = document.getElementById('histGroupBy');
    
    if (isMgr) {
      filterEl.style.display = 'none';
      if(toggleEl) toggleEl.style.display = 'inline-flex';
      if(groupEl) groupEl.style.display = 'inline-block';
      if (window.selectedTechFilter && window.selectedTechFilter !== 'All') {
        histArray = histArray.filter(function(h) { return h.user === window.selectedTechFilter; });
      }
    } else {
      filterEl.style.display = 'none';
      if(toggleEl) toggleEl.style.display = 'none';
      if(groupEl) groupEl.style.display = 'none';
      histArray = histArray.filter(function(h) { return h.user === getTechId(); });
    }

    var term = document.getElementById('histSearch') ? document.getElementById('histSearch').value.toLowerCase() : '';
    if (term) histArray = histArray.filter(function(h) { return (h.addr && h.addr.toLowerCase().includes(term)) || (h.comm && h.comm.toLowerCase().includes(term)) || (h.user && h.user.toLowerCase().includes(term)); });
    
    // Generate Team Status Summary for the Manager Rail
    var d = new Date(); var mm = String(d.getMonth() + 1).padStart(2, '0'); var dd = String(d.getDate()).padStart(2, '0');
    var todayMatch = mm + '/' + dd; var counts = {}; var total = 0;
    (APP_DATA.history||[]).forEach(function(h) { if(h.time.startsWith(todayMatch)) { counts[h.user] = (counts[h.user]||0) + 1; total++; } });
    var teamDiv = document.getElementById('teamStatusDesktop');
    if(teamDiv) {
      if(isMgr) {
        var label = window.selectedTechFilter === 'All' ? 'Team Activity Today' : toProperCase(window.selectedTechFilter) + "'s Activity Today";
        var statsText = window.selectedTechFilter === 'All' ? total + ' total jobs logged by ' + Object.keys(counts).length + ' techs' : total + ' total jobs logged';
        teamDiv.innerHTML = '<div class="p-3 bg-primary bg-opacity-10 border border-primary border-opacity-25 rounded"><div class="fw-bold text-primary mb-1"><i class="bi bi-people-fill me-2"></i>' + label + '</div><div class="text-dark small fw-bold">' + statsText + '</div></div>';
        teamDiv.style.display = 'block';
      } else {
        teamDiv.innerHTML = '';
        teamDiv.style.display = 'none';
      }
    }
    
    var groupBy = groupEl ? groupEl.value : 'none';
    if (isMgr && groupBy !== 'none') {
      histArray = histArray.slice(); 
      if (groupBy === 'tech') histArray.sort(function(a,b) { return (a.user||'').localeCompare(b.user||''); });
      if (groupBy === 'type') histArray.sort(function(a,b) { return (a.typ||'').localeCompare(b.typ||''); });
      if (groupBy === 'date') histArray.sort(function(a,b) { return (b.time.split(' ')[0]).localeCompare(a.time.split(' ')[0]); });
    }
    
    if(!histArray || histArray.length === 0) { 
      var emptyMsg = term ? '<div class="micro-label text-center mt-4 mb-3">Not in recent history.</div><button class="btn btn-outline-primary w-100 rounded-pill fw-bold" onclick="searchDatabase(\'' + term.replace(/'/g, "\\'") + '\')"><i class="bi bi-search me-2"></i>Search Database</button>' : '<div class="micro-label text-center mt-4 mb-3">No recent activity found.</div><button id="btnLoadHistory" class="btn btn-outline-primary w-100 rounded-pill fw-bold" onclick="fetchHistory()"><i class="bi bi-cloud-download me-2"></i>Load Older History</button>';
      if(mContainer) mContainer.innerHTML = emptyMsg;
      if(dContainer) dContainer.innerHTML = '<tr><td colspan="4" class="text-center">' + emptyMsg + '</td></tr>';
      return; 
    }
    var mHtml = ''; var dHtml = ''; var currentGroup = '';
    histArray.forEach(function(h) {
      var originalIndex = APP_DATA.history.findIndex(function(item) { return item.addr === h.addr && item.time === h.time; });
      var mkt = APP_DATA.communities[h.comm] ? APP_DATA.communities[h.comm].market : 'Unknown';
      var jobType = h.typ || 'Unknown';
      
      if (isMgr && groupBy !== 'none') {
        var gVal = '';
        if (groupBy === 'tech') gVal = toProperCase(h.user) || 'Unknown';
        if (groupBy === 'type') gVal = jobType;
        if (groupBy === 'date') gVal = h.time.split(' ')[0];
        
        if (gVal !== currentGroup) {
          dHtml += '<tr><td colspan="4" class="pt-3 pb-2 border-bottom-0" style="font-size:12px; font-weight:800; text-transform:uppercase; background:var(--bg-app); color:var(--text-main);"><i class="bi bi-collection me-2 text-primary"></i>' + gVal + '</td></tr>';
          currentGroup = gVal;
        }
      }

      mHtml += '<div class="poly-card dense-card" onclick="reloadHistoryItem(' + originalIndex + ')"><div class="d-flex justify-content-between mb-2"><span class="status-pill" style="background-color:' + getMktColor(mkt) + ';">' + mkt + '</span><span class="micro-label">' + h.time + '</span></div><div class="data-font fs-6">' + h.comm + '</div><div class="small text-muted mt-1">' + h.addr + '<br><span style="font-size:10px; color:var(--accent-active);">' + toProperCase(h.user) + '</span></div></div>';
      
      dHtml += '<tr style="cursor:pointer;" onclick="reloadHistoryItem(' + originalIndex + ')">';
      dHtml += '<td class="text-muted" style="font-size:11px; font-weight:700; white-space:nowrap;">' + h.time + '</td>';
      dHtml += '<td class="fw-bold" style="font-size:12px; color:var(--accent-active);">' + toProperCase(h.user) + '</td>';
      dHtml += '<td><span class="status-pill" style="background-color:' + getMktColor(mkt) + ';">' + jobType + '</span></td>';
      dHtml += '<td class="small fw-bold">' + h.addr + '<div class="micro-label mt-1">' + h.comm + '</div></td>';
      dHtml += '</tr>';
    });
    if (!term && !APP_DATA.fullHistoryLoaded) {
      var loadBtn = '<button id="btnLoadHistory" class="btn btn-outline-secondary btn-sm w-100 rounded-pill fw-bold mt-3" onclick="fetchHistory()"><i class="bi bi-cloud-download me-2"></i>Load Older History</button>';
      mHtml += loadBtn;
      dHtml += '<tr><td colspan="4">' + loadBtn + '</td></tr>';
    }
    if(mContainer) mContainer.innerHTML = mHtml;
    if(dContainer) dContainer.innerHTML = dHtml;
    
    if (isMgr) updateAnalytics(histArray);
  }

  function searchDatabase(term) {
    var mContainer = document.getElementById('historyItemsMobile');
    var dContainer = document.querySelector('#historyTableDesktop tbody');
    var loadMsg = '<div class="text-center mt-4"><span class="spinner-border spinner-border-sm text-primary mb-2"></span><div class="micro-label">Searching Database...</div></div>';
    if(mContainer) mContainer.innerHTML = loadMsg;
    if(dContainer) dContainer.innerHTML = '<tr><td colspan="4">' + loadMsg + '</td></tr>';
    google.script.run.withSuccessHandler(function(matches) {
      if(matches.length === 0) { 
        if(mContainer) mContainer.innerHTML = '<div class="micro-label text-center mt-4 text-danger">No matches found in database.</div>'; 
        if(dContainer) dContainer.innerHTML = '<tr><td colspan="4" class="text-center micro-label text-danger">No matches found in database.</td></tr>';
        setTimeout(renderHistory, 3000); return; 
      }
      var existingKeys = new Set(APP_DATA.history.map(function(h) { return h.time + '_' + h.addr; }));
      matches.forEach(function(m) { if (!existingKeys.has(m.time + '_' + m.addr)) APP_DATA.history.push(m); });
      renderHistory();
    }).withFailureHandler(function(err) { alert("Search failed: " + err.message); renderHistory(); }).searchHistoryDB(term);
  }

  // --- WORK TRACKER & EOD ---
  function getCombinedSerials() {
    var serials = [];
    var ont = document.getElementById('trackSerialOnt').value.trim().toUpperCase();
    var m1 = document.getElementById('trackSerialMesh1').value.trim().toUpperCase();
    var m2 = document.getElementById('trackSerialMesh2').value.trim().toUpperCase();
    var m3 = document.getElementById('trackSerialMesh3').value.trim().toUpperCase();
    var m4 = document.getElementById('trackSerialMesh4').value.trim().toUpperCase();
    var db = document.getElementById('trackSerialDoorbell').value.trim().toUpperCase();
    
    if(ont) serials.push("ONT: " + ont);
    if(m1) serials.push("Mesh 1: " + m1);
    if(m2) serials.push("Mesh 2: " + m2);
    if(m3) serials.push("Mesh 3: " + m3);
    if(m4) serials.push("Mesh 4: " + m4);
    if(db) serials.push("Doorbell: " + db);
    
    return serials.join(" | ");
  }

  function submitWorkTracker() {
    var btn = document.getElementById('btnTrack');
    var jobData = { 
      apptId: document.getElementById('trackApptId') ? document.getElementById('trackApptId').value : "",
      addr: document.getElementById('trackAddr').innerText, 
      comm: document.getElementById('comm').value, 
      type: document.getElementById('trackJobType').value,
      light: document.getElementById('trackLight').value,
      distance: document.getElementById('trackDistance').value,
      tubeColor: document.getElementById('trackTubeColor').value,
      portColor: document.getElementById('trackPortColor').value,
      splice: document.getElementById('trackSplice').value,
      serial: getCombinedSerials(),
      notes: document.getElementById('trackNotes').value
    };
    if(!jobData.comm || jobData.comm === "") return alert("Please select the Community in the Provisioning tab first.");
    
    // Smart Validation
    var requiresFiber = (jobData.type === "Fiber Blow" || jobData.type === "Fiber Blow + Install");
    var requiresEquipment = jobData.type.includes("Install"); 
    var requiresNote = ["Home Not Ready", "Trouble Ticket", "Refered to Maintenance", "Performed Maintenance", "Not Live"].includes(jobData.type);

    if (requiresFiber && (!jobData.light || !jobData.distance || !jobData.tubeColor || !jobData.portColor || !jobData.splice)) {
      return alert("Please fill out all Fiber Data fields (Light, Distance, Tube, Port, Splice) for this job type.");
    }
    
    if (requiresEquipment) {
      var ont = document.getElementById('trackSerialOnt').value.trim().toUpperCase();
      var m1 = document.getElementById('trackSerialMesh1').value.trim().toUpperCase();
      var m2 = document.getElementById('trackSerialMesh2').value.trim().toUpperCase();
      var m3 = document.getElementById('trackSerialMesh3').value.trim().toUpperCase();
      var m4 = document.getElementById('trackSerialMesh4').value.trim().toUpperCase();
      var db = document.getElementById('trackSerialDoorbell').value.trim().toUpperCase();
      var totalEquipment = [ont, m1, m2, m3, m4, db].filter(Boolean).length;
      
      if (jobData.type === "Mesh Install" && !m1 && !m2 && !m3 && !m4) return alert("Please provide at least one Mesh Serial.");
      if (jobData.type === "Doorbell Install" && !db) return alert("Please provide a Doorbell Serial.");
      if ((jobData.type === "Install" || jobData.type === "Fiber Blow + Install") && totalEquipment === 0) {
        return alert("Please provide at least one Equipment Serial (ONT, Mesh, or Doorbell) for this installation.");
      }
    }

    if (requiresNote && !jobData.notes) return alert("Please provide details/notes for this job type.");

    btn.innerText = "Logging...";
    document.getElementById('trackResult').style.display = 'none';
    google.script.run.withSuccessHandler(function(res){
       btn.innerText = "Log Job";
       if(res.error) return alert(res.error);
       document.getElementById('trackFormLink').href = res.url;
       document.getElementById('trackResult').style.display = 'block';
       clearWorkTracker();
       setTimeout(function() {
         document.getElementById('trackResult').style.display = 'none';
       }, 5000);
    }).logWorkTracker(jobData, getTechId());
  }

  function sendEOD() {

  // --- SMART LOCATION ID & COMMUNITIES ---
  function autoGenLocId() {
    var isEdit = document.getElementById('modOldId').value !== "";
    if (isEdit) return; 

    var name = document.getElementById('modCommName').value.trim().toUpperCase();
    var city = document.getElementById('modCommCity').value.trim().toUpperCase();
    if (!name || !city) return;

    var cityChars = city.replace(/[^A-Z]/g, '');
    var cCode = "XXXX";
    if (cityChars.length > 0) {
      var firstLtr = cityChars.charAt(0);
      var rest = cityChars.slice(1).replace(/[AEIOU]/g, '');
      cCode = (firstLtr + rest).padEnd(4, 'X').substring(0, 4);
    }

    var words = name.split(/\s+/).filter(function(w) { return w.length > 0; });
    var nCode = "XX";
    if (words.length >= 2) {
      nCode = words[0].charAt(0) + words[1].charAt(0);
    } else if (words.length === 1 && words[0].length > 1) {
      var w = words[0];
      nCode = w.charAt(0) + w.replace(/[AEIOU]/g, '').charAt(1);
      if(!nCode || nCode.length < 2) nCode = w.substring(0,2);
    }
    if (name.includes('6')) nCode = '6C'; 

    document.getElementById('modCommLoc').value = cCode + "TX" + nCode;
  }

  function findSimilarCommunities(newName) {
    var term = newName.toLowerCase().replace(/[^a-z0-9]/g, '');
    var matches = [];
    if(term.length < 3) return matches;
    Object.values(APP_DATA.communities).forEach(function(c) {
      var existingName = c.name.toLowerCase().replace(/[^a-z0-9]/g, '');
      if (existingName.includes(term) || term.includes(existingName)) { matches.push(c.name + ' (' + c.market + ')'); }
    });
    return matches;
  }

  function saveComm() {
    var oldId = unescape(document.getElementById('modOldId').value);
    var c = { name: document.getElementById('modCommName').value.trim(), market: document.getElementById('modCommMkt').value, type: document.getElementById('modCommTyp').value, locationId: document.getElementById('modCommLoc').value.toUpperCase(), city: document.getElementById('modCommCity').value, state: "TX", zip: document.getElementById('modCommZip').value, vlan: document.getElementById('modCommVlan').value };
    if(!c.name || !c.market || !c.type) return alert("Name, Market, and Type required.");
    
    pendingCommSave = { c: c, oldId: oldId };

    if (!oldId) {
      var similarities = findSimilarCommunities(c.name);
      if (similarities.length > 0) {
         var listHtml = similarities.map(function(s){ return '<div class="poly-card p-2 mb-1 small fw-bold"><i class="bi bi-building me-2 text-muted"></i>' + s + '</div>'; }).join('');
         document.getElementById('fuzzyMatchesList').innerHTML = listHtml;
         document.getElementById('fuzzyModalOverlay').classList.add('show');
         closeModal(); 
         return;
      }
    }
    confirmSaveComm(); 
  }

    var pending = pendingCommSave;

                 '<div class="col-6"><span class="micro-label">Start Time</span><input type="time" id="modTime" class="form-control" value="' + timeVal + '"></div>' +
               '</div>' +
               '<span class="micro-label">Duration</span>' +
               '<div class="d-flex gap-2 mb-4 overflow-auto pb-1" id="durPills">' +
                 '<button class="filter-pill ' + (durMins === 30 ? 'active' : '') + '" onclick="setDur(30, this)">30 min</button>' +
                 '<button class="filter-pill ' + (durMins === 60 ? 'active' : '') + '" onclick="setDur(60, this)">1 hr</button>' +
                 '<button class="filter-pill ' + (durMins === 120 ? 'active' : '') + '" onclick="setDur(120, this)">2 hr</button>' +
                 '<button class="filter-pill ' + (durMins === 180 ? 'active' : '') + '" onclick="setDur(180, this)">3 hr</button>' +
               '</div>' +
               '<input type="hidden" id="modDur" value="' + durMins + '">' +
               '<div class="d-flex gap-2"><button class="btn btn-outline-secondary w-50 rounded-pill fw-bold" onclick="closeModal()">Cancel</button><button id="btnSaveAppt" class="btn btn-primary w-50 rounded-pill fw-bold" onclick="saveAppt()">' + (isEdit ? 'Update' : 'Save') + '</button></div>'; 
    document.getElementById('modalContent').innerHTML = html; 
    document.getElementById('modalOverlay').classList.add('show'); 
  }

  function setDur(m, btn) {
    document.getElementById('modDur').value = m;
    var pills = document.getElementById('durPills').querySelectorAll('.filter-pill'); pills.forEach(function(p) { p.classList.remove('active'); }); btn.classList.add('active');
  }

  function handleHubSpotPaste() {
    var val = document.getElementById('hubspotPaste').value.trim();
    if(!val) return;
    var match = val.match(/^(.*?)\s+-\s+(.*?)\s+in\s+(.*)$/i);
    if (match) {
      var jt = match[1].trim(), addr = match[2].trim(), commRaw = match[3].trim();
      document.getElementById('modAddr').value = addr;

      // Auto-select Job Type
      var jtSelect = document.getElementById('modJobType');
      var jtLower = jt.toLowerCase();
      for(var i=0; i<jtSelect.options.length; i++) {
        if(jtSelect.options[i].value && (jtSelect.options[i].value.toLowerCase() === jtLower || jtLower.includes(jtSelect.options[i].value.toLowerCase()))) { jtSelect.selectedIndex = i; break; }
      }
      // Auto-select Community (fuzzy match)
      var commSelect = document.getElementById('modComm');
      var commLower = commRaw.toLowerCase();
      for(var j=0; j<commSelect.options.length; j++) {
        if(commSelect.options[j].value && (commLower.includes(commSelect.options[j].value.toLowerCase()) || commSelect.options[j].value.toLowerCase().includes(commLower.split(' ')[0]))) { commSelect.selectedIndex = j; break; }
      }
    }
  }

  function saveAppt() {
    var id = document.getElementById('modApptId').value;
    var name = document.getElementById('modName').value.trim();
    var addr = document.getElementById('modAddr').value.trim();
    var dateVal = document.getElementById('modDate').value;
    var timeVal = document.getElementById('modTime').value;
    var durMins = parseInt(document.getElementById('modDur').value);
    var comm = document.getElementById('modComm').value;
    var jobType = document.getElementById('modJobType').value;
    var unit = document.getElementById('modUnit').value.trim();
    var status = document.getElementById('modStatus') ? document.getElementById('modStatus').value : 'Scheduled';
    var finalAssignedTech = document.getElementById('modAssignTech') ? document.getElementById('modAssignTech').value : getTechId();

    if(!addr || !dateVal || !timeVal) return alert("Address, Date, and Time are required.");
    document.getElementById('btnSaveAppt').innerText = id ? "Updating..." : "Saving...";

    var dt = new Date(dateVal + 'T' + timeVal + ':00');
    var endDt = new Date(dt.getTime() + durMins * 60000);

    var displayDate = String(dt.getMonth() + 1).padStart(2, '0') + '/' + String(dt.getDate()).padStart(2, '0');
    function formatTime12(dateObj) { var h = dateObj.getHours(), m = dateObj.getMinutes(), ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; m = m < 10 ? '0' + m : m; return h + ':' + m + ' ' + ampm; }
    
    var timeStr = displayDate + ' • ' + formatTime12(dt) + ' - ' + formatTime12(endDt);
    var apptId = id || new Date().getTime().toString();
    var appt = { id: apptId, name: name, address: addr, time: timeStr, status: status, rawDate: dateVal, rawTime: timeVal, durMins: durMins, comm: comm, jobType: jobType, unit: unit, user: finalAssignedTech };

    google.script.run.withSuccessHandler(function() {
      if (!APP_DATA.appointments) APP_DATA.appointments = [];
      if (id) {
        var idx = APP_DATA.appointments.findIndex(function(a) { return a.id.toString() === id.toString(); });
        if (idx > -1) APP_DATA.appointments[idx] = appt;
      } else {
        APP_DATA.appointments.push(appt);
      }
      renderAppointments();
      closeModal();
    }).saveAppt(appt, finalAssignedTech);
  }

  function deleteAppt(id) { if(confirm("Remove appointment?")) { APP_DATA.appointments = APP_DATA.appointments.filter(function(a){ return a.id.toString() !== id.toString(); }); renderAppointments(); google.script.run.deleteAppt(id); } }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

  // --- BARCODE SCANNER LOGIC ---
  var html5QrCode;
  var currentScanTarget = '';
  var isTorchOn = false;

  function openScanner(targetId) {
    currentScanTarget = targetId;
    var modal = document.getElementById('scannerModalOverlay');
    
    // Inject flashlight toggle dynamically next to the close button
    if (!document.getElementById('btnTorch')) {
      var header = modal.querySelector('.d-flex');
      if (header && header.lastElementChild) {
        var closeBtn = header.lastElementChild;
        var btnContainer = document.createElement('div');
        btnContainer.innerHTML = '<button id="btnTorch" class="btn btn-sm btn-outline-warning rounded-circle shadow-sm me-2" onclick="toggleTorch()"><i class="bi bi-lightbulb-fill"></i></button>';
        header.insertBefore(btnContainer, closeBtn);
        btnContainer.appendChild(closeBtn);
      }
    }

    modal.classList.add('show');
    
    if (!html5QrCode) {
      html5QrCode = new Html5Qrcode("scanner-reader");
    }
    
    html5QrCode.start(
      { facingMode: "environment" }, // Prioritizes rear camera
      { fps: 10, qrbox: { width: 250, height: 100 } },
      function(decodedText, decodedResult) {
        document.getElementById(currentScanTarget).value = decodedText;
        if(navigator.vibrate) navigator.vibrate(100); // Haptic feedback on read
        closeScanner();
      },
      function(errorMessage) { /* Expected loop error when barcode isn't in frame; ignore */ }
    ).catch(function(err) {
      alert("Camera access denied or unavailable. Please check your browser permissions.");
      closeScanner();
    });
  }

  function closeScanner() {
    if (html5QrCode && html5QrCode.isScanning) { html5QrCode.stop().then(function() { html5QrCode.clear(); }).catch(function(err) { console.log(err); }); }
    
    // Reset the flashlight state when closing
    isTorchOn = false;
    var btn = document.getElementById('btnTorch');
    if (btn) { btn.classList.replace('btn-warning', 'btn-outline-warning'); btn.classList.remove('text-white'); }
    
    document.getElementById('scannerModalOverlay').classList.remove('show');
  }

  function toggleTorch() {
    if (!html5QrCode) return;
    isTorchOn = !isTorchOn;
    var btn = document.getElementById('btnTorch');
    
    html5QrCode.applyVideoConstraints({ advanced: [{ torch: isTorchOn }] })
      .then(function() {
        if (isTorchOn) { btn.classList.replace('btn-outline-warning', 'btn-warning'); btn.classList.add('text-white'); } 
        else { btn.classList.replace('btn-warning', 'btn-outline-warning'); btn.classList.remove('text-white'); }
      })
      .catch(function(err) {
        isTorchOn = !isTorchOn; // Revert state if unsupported
        alert("Flashlight not supported or permission denied on this device's browser.");
      });
  }

  // --- FEEDBACK BACKLOG ---
  function openFeedbackModal() {
    var html = '<h5 class="fw-bold mb-3"><i class="bi bi-chat-square-text-fill text-warning me-2"></i>Beta Feedback</h5><p class="small text-muted mb-3">Found a bug or have a suggestion? Let us know!</p><textarea id="feedbackText" class="form-control mb-4" rows="4" placeholder="Type your feedback here..."></textarea><div class="d-flex gap-2"><button class="btn btn-outline-secondary w-50 rounded-pill fw-bold" onclick="closeModal()">Cancel</button><button class="btn btn-warning w-50 rounded-pill fw-bold" onclick="saveFeedback()">Submit</button></div>';
    document.getElementById('modalContent').innerHTML = html; document.getElementById('modalOverlay').classList.add('show');
  }
  function saveFeedback() {
    var text = document.getElementById('feedbackText').value.trim();
    if(!text) return alert("Please enter your feedback first.");
    var btn = document.querySelector('#modalContent .btn-warning');
    if(btn) btn.innerText = "Sending...";
    google.script.run.withSuccessHandler(function(res) { 
      closeModal(); 
      if(res.error) alert("Error: " + res.error); 
      else { 
        alert("Feedback submitted! Thank you."); 
        if(APP_DATA.feedback) { APP_DATA.feedback.unshift({user: getTechId(), text: text, time: "Just now", timestamp: new Date().getTime()}); renderFeedback(); }
      } 
    })
      .submitFeedback(text, getTechId());
  }

  // --- LEAFLET ADMIN MAP LOGIC ---
  var adminMapVar = null;
  var adminMapMarkers = L.layerGroup();
  
  function renderAdminMap() {
    // Dynamic Map Title
    var titleEl = document.getElementById('mapPaneTitle');
    if (titleEl) {
      if (isManager()) {
         if (window.selectedTechFilter && window.selectedTechFilter !== 'All') {
           titleEl.innerHTML = '<i class="bi bi-geo-alt-fill me-2"></i>' + toProperCase(window.selectedTechFilter).split(' ')[0] + "'s Route";
         } else {
           titleEl.innerHTML = '<i class="bi bi-geo-alt-fill me-2"></i>Team Locations';
         }
      } else {
         titleEl.innerHTML = '<i class="bi bi-geo-alt-fill me-2"></i>My Route';
      }
    }

    if (!adminMapVar) {
      adminMapVar = L.map('adminMap').setView([31.9686, -99.9018], 6); // Default Texas
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19, attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
      }).addTo(adminMapVar);
      adminMapMarkers.addTo(adminMapVar);
    }
    
    // Ensure map resizes correctly if container was hidden during init
    adminMapVar.invalidateSize();
    adminMapMarkers.clearLayers();
    
    var today = new Date();
    var todayStr = today.getFullYear() + "-" + String(today.getMonth() + 1).padStart(2, '0') + "-" + String(today.getDate()).padStart(2, '0');
    var appts = APP_DATA.appointments || [];
    
    if (!isManager()) { 
       appts = appts.filter(function(a) { return a.user === getTechId(); });
    } else if (window.selectedTechFilter !== 'All') {
       appts = appts.filter(function(a) { return a.user === window.selectedTechFilter; });
    }
    
    var todayAppts = appts.filter(function(a) { 
      if (!a.time) return false;
      var ad = parseApptTime(a).date;
      var adStr = ad.getFullYear() + "-" + String(ad.getMonth() + 1).padStart(2, '0') + "-" + String(ad.getDate()).padStart(2, '0');
      return adStr === todayStr;
    });
    
    var commGroups = {};
    todayAppts.forEach(function(a) {
      if (!a.comm) return;
      if (!commGroups[a.comm]) commGroups[a.comm] = [];
      commGroups[a.comm].push(a.user);
    });
    
    var fiberColors = [
      { bg: '#3b82f6', fg: '#fff' }, { bg: '#f97316', fg: '#fff' }, { bg: '#22c55e', fg: '#fff' },
      { bg: '#8b4513', fg: '#fff' }, { bg: '#64748b', fg: '#fff' }, { bg: '#ffffff', fg: '#000' },
      { bg: '#ef4444', fg: '#fff' }, { bg: '#000000', fg: '#fff' }, { bg: '#eab308', fg: '#000' },
      { bg: '#8b5cf6', fg: '#fff' }, { bg: '#f43f5e', fg: '#fff' }, { bg: '#06b6d4', fg: '#000' }
    ];
    var techColorMap = {};
    if (APP_DATA.roster) {
      var tMap = {};
      APP_DATA.roster.forEach(function(e) { tMap[e.short || e.name] = e.name; });
      Object.keys(tMap).sort().forEach(function(t, i) {
        techColorMap[t] = fiberColors[i % fiberColors.length].bg;
        techColorMap[toProperCase(t)] = fiberColors[i % fiberColors.length].bg;
      });
    }
    
    var bounds = [];
    var geocodingQueue = [];
    Object.keys(commGroups).forEach(function(commName) {
      var commInfo = APP_DATA.communities[commName];
      if (commInfo) {
        if (commInfo.lat && commInfo.lng) {
          plotMarker(commName, commInfo.lat, commInfo.lng, commGroups[commName], bounds, techColorMap);
        } else if (commInfo.city && commInfo.zip) { 
          geocodingQueue.push(commName);
        }
      }
    });
    
    function processGeocodeQueue() {
       if (geocodingQueue.length === 0) return;
       var commName = geocodingQueue.shift();
       var commInfo = APP_DATA.communities[commName];
       
       var preciseQuery = encodeURIComponent(commName + ", " + commInfo.city + ", TX " + commInfo.zip);
       var fallbackQuery = encodeURIComponent(commInfo.city + ", TX " + commInfo.zip);
       
       fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + preciseQuery)
         .then(res => res.json())
         .then(data => {
           if (data && data.length > 0) {
             // Precise Match Found
             var lat = parseFloat(data[0].lat); var lng = parseFloat(data[0].lon);
             commInfo.lat = lat; commInfo.lng = lng;
             google.script.run.withFailureHandler(err => console.error(err)).saveCommunityCoordinates(commName, lat, lng);
             plotMarker(commName, lat, lng, commGroups[commName], bounds, techColorMap);
             setTimeout(processGeocodeQueue, 1500); // 1.5s delay before next
           } else {
             // Fallback to City + Zip
             setTimeout(function() {
               fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + fallbackQuery)
                 .then(res2 => res2.json())
                 .then(data2 => {
                   if (data2 && data2.length > 0) {
                     var lat = parseFloat(data2[0].lat); var lng = parseFloat(data2[0].lon);
                     commInfo.lat = lat; commInfo.lng = lng;
                     google.script.run.withFailureHandler(err => console.error(err)).saveCommunityCoordinates(commName, lat, lng);
                     plotMarker(commName, lat, lng, commGroups[commName], bounds, techColorMap);
                   }
                   setTimeout(processGeocodeQueue, 1500); // 1.5s delay before next
                 }).catch(e => { console.error(e); setTimeout(processGeocodeQueue, 1500); });
             }, 1500);
           }
         }).catch(err => { console.error(err); setTimeout(processGeocodeQueue, 1500); });
    }
    
    processGeocodeQueue();
  }
  
  function plotMarker(commName, lat, lng, usersArray, bounds, techColorMap) {
    if (!isFinite(lat) || !isFinite(lng)) return;
    var uniqueUsers = Array.from(new Set(usersArray));
    var markerBg = '#3b82f6';
    if (isManager() && uniqueUsers.length > 0 && techColorMap[uniqueUsers[0]]) {
       markerBg = techColorMap[uniqueUsers[0]];
    }
    
    var popupText = "<div class='small fw-bold'>" + commName + "</div><div class='micro-label mt-1'>Techs: " + toProperCase(uniqueUsers.join(", ")) + "</div>";
    var iconHtml = '<div style="background-color: ' + markerBg + '; width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5);"></div>';
    var customIcon = L.divIcon({ html: iconHtml, className: '', iconSize: [26, 26], iconAnchor: [13, 13] });

    var marker = L.marker([lat, lng], { icon: customIcon }).bindPopup(popupText);
    adminMapMarkers.addLayer(marker);
    bounds.push([lat, lng]);
    if (adminMapVar && bounds.length > 0) { adminMapVar.fitBounds(bounds, { padding: [30, 30], maxZoom: 12 }); }
  }
</script>
