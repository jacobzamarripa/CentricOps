<div id="loader" class="loader-bg">
  <div class="spinner-border text-primary mb-4" style="width: 2.5rem; height: 2.5rem; border-width: 0.25em;"></div>
  <div class="progress-track"><div id="loaderProgress" class="progress-fill"></div></div>
  <div id="loaderText" style="font-family: monospace; font-size: 12px; color: var(--text-muted);">Connecting to Master DB...</div>
</div>

<div id="modalOverlay" class="modal-overlay"><div class="modal-glass" id="modalContent"></div></div>
<div id="fuzzyModalOverlay" class="modal-overlay">
  <div class="modal-glass text-center">
    <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 3rem;"></i>
    <h5 class="fw-bold mt-2 mb-3">Similar Communities Found</h5>
    <p class="small text-muted">The community you are adding closely matches existing records. Please review them to avoid creating a duplicate.</p>
    <div id="fuzzyMatchesList" class="text-start mb-4 overflow-auto" style="max-height: 150px;"></div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary w-50 rounded-pill fw-bold" onclick="closeFuzzyModal()">Cancel Add</button>
      <button class="btn btn-warning w-50 rounded-pill fw-bold" onclick="confirmSaveComm()">Add Anyway</button>
    </div>
  </div>
</div>
