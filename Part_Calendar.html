<div id="calendarWidget" class="calendar-popup" style="display:none;">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <button class="btn btn-light rounded-circle shadow-sm" style="width:36px; height:36px; padding:0;" onclick="changeMonth(-1)"><i class="bi bi-chevron-left text-muted"></i></button>
    <div class="fw-bold fs-5" id="calMonthYear"></div>
    <button class="btn btn-light rounded-circle shadow-sm" style="width:36px; height:36px; padding:0;" onclick="changeMonth(1)"><i class="bi bi-chevron-right text-muted"></i></button>
  </div>
  <div class="calendar-grid cal-header-row mb-2"><div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div></div>
  <div class="calendar-grid" id="calDays"></div>
</div>
