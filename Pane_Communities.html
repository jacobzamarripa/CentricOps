<div id="pane-comm" class="glass-pane">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-building me-2"></i>Communities</h4>
    <button class="btn btn-dark rounded-circle" style="width:38px;height:38px;padding:0;" onclick="openCommModal()"><i class="bi bi-plus"></i></button>
  </div>
  <div class="d-flex gap-2 mb-3 overflow-auto pb-1" id="commFilters" style="scrollbar-width: none;">
    <select id="commTypeFilter" class="form-select form-select-pill" onchange="applyCommFilter()"><option value="All">All Types</option></select>
    <select id="commMktFilter" class="form-select form-select-pill" onchange="applyCommFilter()"><option value="All">All Markets</option></select>
  </div>
  <input type="text" id="commSearch" class="form-control mb-4" placeholder="Search communities..." onkeyup="applyCommFilter()">
  <div id="commCardsMobile" class="mobile-only"></div>
  <div class="desktop-only overflow-auto" style="border-radius: 16px; max-height: calc(100vh - 280px);">
    <table class="custom-table" id="commTableDesktop">
      <thead>
        <tr>
          <th>Community</th>
          <th>Market</th>
          <th>Type</th>
          <th>City</th>
          <th>Zip</th>
          <th>Location ID</th>
          <th>VLAN</th>
          <th class="text-end">Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
