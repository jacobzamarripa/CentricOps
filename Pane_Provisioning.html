<div id="pane-tool" class="glass-pane">
  <h4 class="mb-3"><i class="bi bi-cpu me-2"></i>Provisioning</h4>
  <div class="row g-2 mb-2">
    <div class="col-6"><span class="micro-label">Market</span><select id="mkt" class="form-select" onchange="filterComms()"></select></div>
    <div class="col-6"><span class="micro-label">Type</span><select id="typ" class="form-select" onchange="filterComms()"></select></div>
  </div>
  <span class="micro-label">Community</span><select id="comm" class="form-select mb-2" disabled></select>
  <span class="micro-label">Street Address</span><input type="text" id="addr" class="form-control mb-2" placeholder="123 Main St">
  <div id="unitContainer" style="display:none;"><span class="micro-label text-primary">Apt / Unit #</span><input type="text" id="unit" class="form-control mb-3"></div>
  
  <button onclick="calculateProvisioning()" id="btnGen" class="btn btn-magic w-100 rounded-pill py-2 mt-2">Generate QRs</button>
  
  <div id="qrResults" style="display:none;" class="mt-3 border-top pt-2">
    <div id="errorBox" class="alert alert-danger fw-bold small text-center" style="display:none;"></div>
    <div id="successBox" style="display:none;"></div>
    
    <button id="trackPromptBtn" class="btn btn-sm btn-outline-success w-100 rounded-pill mt-3 fw-bold" style="display:none; border-style: dashed;" onclick="jumpToTracker()"><i class="bi bi-clipboard-check me-2"></i>Log Installation in Tracker</button>
  </div>
</div>
